name: Deploy to EC2

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 3.27.84.212
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd payment-app
            git pull origin master
            docker compose down
            docker compose up --build -d