name: CI/CD Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Configure AWS credentials
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 3. Login to ECR
      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Build Docker image
      - name: Build image
        run: |
          docker build -t payment-app . 

       #sd   

      # 5. Tag image
      - name: Tag image
        run: |
          docker tag payment-app:latest \
          ${{ steps.login-ecr.outputs.registry }}/payment-app:latest

      # 6. Push image to ECR
      - name: Push image
        run: |
          docker push ${{ steps.login-ecr.outputs.registry }}/payment-app:latest

      # 7. Deploy to EC2
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd payment-app

            git fetch origin
            git reset --hard origin/master

            docker compose down
            docker compose pull
            docker compose up -d